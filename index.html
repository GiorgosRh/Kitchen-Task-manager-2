<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Helios & Ella — Μενού & Εργασίες</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #f4efe6;
  --bg2: #ede6d8;
  --paper: #faf7f2;
  --dark: #1e2a1a;
  --olive: #3d5a2e;
  --olive2: #4e7040;
  --gold: #b8860b;
  --terra: #a0522d;
  --grey: #7a7060;
  --line: #d9d0c0;
  --white: #ffffff;
  --green-soft: #e8f0e4;
  --done-bg: #e8f5e0;
  --done-line: #a0c88a;
  --shadow: 0 2px 16px rgba(30,42,26,0.08);
  --radius: 12px;
}

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--dark);
  min-height: 100vh;
  font-size: 14px;
}

/* ── HEADER ── */
.header {
  background: var(--dark);
  padding: 16px 24px;
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 3px solid var(--gold);
}
.brand { display: flex; align-items: center; gap: 10px; }
.brand-icon { font-size: 22px; }
.brand h1 {
  font-family: 'Playfair Display', serif;
  font-size: 1.25rem; font-weight: 700;
  color: var(--gold);
  letter-spacing: 0.03em;
}
.brand p { font-size: 0.68rem; color: rgba(255,255,255,0.4); letter-spacing: 0.12em; text-transform: uppercase; margin-top: 1px; }

.header-actions { display: flex; gap: 8px; align-items: center; }
.btn-sm {
  font-family: 'DM Sans', sans-serif;
  font-size: 0.78rem; font-weight: 600;
  padding: 7px 14px; border-radius: 8px; cursor: pointer; border: none;
  transition: all 0.15s;
}
.btn-outline { background: transparent; border: 1px solid rgba(255,255,255,0.2); color: rgba(255,255,255,0.6); }
.btn-outline:hover { background: rgba(255,255,255,0.07); color: white; }
.btn-gold { background: var(--gold); color: white; }
.btn-gold:hover { filter: brightness(1.1); }

/* ── CONTROLS ── */
.controls {
  background: var(--dark);
  padding: 0 24px 14px;
  display: flex; gap: 12px; align-items: center; flex-wrap: wrap;
}

.pill-group { display: flex; gap: 3px; background: rgba(255,255,255,0.06); padding: 3px; border-radius: 9px; }
.pill {
  font-family: 'DM Sans', sans-serif;
  font-size: 0.78rem; font-weight: 600;
  padding: 5px 12px; border: none; border-radius: 7px;
  background: transparent; color: rgba(255,255,255,0.45); cursor: pointer;
  transition: all 0.15s; white-space: nowrap;
}
.pill:hover { color: rgba(255,255,255,0.8); }
.pill.active { background: var(--olive); color: white; }
.pill.active.bf { background: #c17f24; }
.pill.active.lunch { background: #3d7a4e; }
.pill.active.dinner { background: #5a3d7a; }

.sep { width: 1px; height: 24px; background: rgba(255,255,255,0.08); }

.theme-tag {
  font-family: 'Playfair Display', serif;
  font-size: 0.82rem; font-style: italic; color: var(--gold);
  opacity: 0; transition: opacity 0.3s;
}
.theme-tag.show { opacity: 1; }

/* ── LAYOUT ── */
.layout {
  display: grid;
  grid-template-columns: 380px 1fr;
  gap: 0;
  height: calc(100vh - 100px);
}

/* ── LEFT: MENU PANEL ── */
.menu-panel {
  background: var(--paper);
  border-right: 2px solid var(--line);
  overflow-y: auto;
  padding: 20px;
}

.menu-panel::-webkit-scrollbar { width: 4px; }
.menu-panel::-webkit-scrollbar-thumb { background: var(--line); border-radius: 2px; }

.menu-panel-header {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 16px;
}
.menu-panel-title {
  font-family: 'Playfair Display', serif;
  font-size: 1rem; font-weight: 700; color: var(--olive);
}

.search-box {
  width: 100%;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.82rem;
  padding: 7px 12px;
  border: 1.5px solid var(--line);
  border-radius: 8px;
  background: white;
  margin-bottom: 14px;
  color: var(--dark);
  outline: none;
  transition: border-color 0.15s;
}
.search-box:focus { border-color: var(--olive2); }
.search-box::placeholder { color: #bbb; }

/* Station block */
.station-block { margin-bottom: 14px; }
.station-title {
  font-size: 0.68rem; font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.12em;
  color: var(--grey);
  padding: 6px 0 4px;
  border-bottom: 1px solid var(--line);
  margin-bottom: 6px;
  display: flex; align-items: center; gap: 6px;
}
.station-title .sico { font-size: 0.9rem; }

.menu-item {
  display: flex; align-items: flex-start; gap: 8px;
  padding: 5px 6px; border-radius: 6px;
  cursor: pointer; transition: background 0.12s;
  border: 1.5px solid transparent;
}
.menu-item:hover { background: var(--green-soft); }
.menu-item.selected { background: #e6f0e0; border-color: var(--olive2); }

.item-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--olive2); margin-top: 5px; flex-shrink: 0; }
.item-name { font-size: 0.84rem; color: var(--dark); line-height: 1.4; flex: 1; }
.item-add-btn {
  font-size: 0.72rem; font-weight: 600; color: var(--olive);
  background: none; border: 1px solid var(--olive2);
  padding: 2px 7px; border-radius: 5px; cursor: pointer; white-space: nowrap;
  opacity: 0; transition: opacity 0.12s;
}
.menu-item:hover .item-add-btn { opacity: 1; }
.item-add-btn:hover { background: var(--olive); color: white; }

/* ── RIGHT: TASKS PANEL ── */
.tasks-panel {
  overflow-y: auto;
  padding: 20px 24px;
  background: var(--bg);
}

.tasks-panel::-webkit-scrollbar { width: 4px; }
.tasks-panel::-webkit-scrollbar-thumb { background: var(--line); border-radius: 2px; }

.tasks-header {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 18px;
}
.tasks-title {
  font-family: 'Playfair Display', serif;
  font-size: 1rem; font-weight: 700; color: var(--dark);
}
.add-worker-btn {
  display: flex; align-items: center; gap: 6px;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.8rem; font-weight: 600;
  color: var(--olive); background: white;
  border: 1.5px solid var(--olive2);
  padding: 7px 14px; border-radius: 8px; cursor: pointer;
  transition: all 0.15s;
}
.add-worker-btn:hover { background: var(--olive); color: white; }

/* Workers grid */
.workers-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 16px;
}

/* Worker card */
.worker-card {
  background: white;
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  overflow: hidden;
  border: 1.5px solid var(--line);
}

.worker-card-header {
  padding: 12px 16px;
  background: var(--olive);
  display: flex; align-items: center; justify-content: space-between;
}
.worker-card-header .worker-name {
  font-family: 'Playfair Display', serif;
  font-size: 0.95rem; font-weight: 600; color: white;
  display: flex; align-items: center; gap: 8px;
}
.worker-avatar {
  width: 28px; height: 28px; border-radius: 50%;
  background: rgba(255,255,255,0.25);
  display: flex; align-items: center; justify-content: center;
  font-size: 0.75rem; font-weight: 700; color: white;
}
.worker-header-right { display: flex; gap: 6px; align-items: center; }
.worker-progress-text { font-size: 0.72rem; color: rgba(255,255,255,0.7); }
.remove-worker-btn { background: none; border: none; color: rgba(255,255,255,0.4); font-size: 0.9rem; cursor: pointer; padding: 2px 4px; }
.remove-worker-btn:hover { color: white; }

.worker-tasks-list { padding: 8px 12px; min-height: 48px; }

.task-item {
  display: flex; align-items: flex-start; gap: 8px;
  padding: 6px 4px; border-bottom: 1px solid #f0ebe0;
  animation: slideIn 0.2s ease;
}
.task-item:last-child { border-bottom: none; }

@keyframes slideIn {
  from { opacity: 0; transform: translateY(-6px); }
  to { opacity: 1; transform: translateY(0); }
}

.task-check {
  width: 18px; height: 18px; border: 2px solid var(--line);
  border-radius: 4px; cursor: pointer; flex-shrink: 0; margin-top: 1px;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s; background: white;
}
.task-check:hover { border-color: var(--olive2); }
.task-check.checked { background: var(--olive2); border-color: var(--olive2); }
.task-check.checked::after { content: '✓'; color: white; font-size: 10px; font-weight: 700; }

.task-text { flex: 1; font-size: 0.84rem; line-height: 1.4; color: var(--dark); }
.task-text.done { text-decoration: line-through; color: #aaa; }

.task-tag {
  font-size: 0.68rem; font-weight: 600; padding: 1px 6px;
  border-radius: 4px; background: var(--green-soft); color: var(--olive2);
  white-space: nowrap; flex-shrink: 0; margin-top: 2px;
}

.task-del { background: none; border: none; color: #ccc; font-size: 0.8rem; cursor: pointer; padding: 0 2px; flex-shrink: 0; }
.task-del:hover { color: var(--terra); }

/* Add task row */
.add-task-row {
  padding: 8px 12px 10px;
  border-top: 1px dashed var(--line);
}
.add-task-input-wrap { display: flex; gap: 6px; }
.add-task-input {
  flex: 1;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.82rem;
  padding: 7px 10px; border: 1.5px solid var(--line);
  border-radius: 7px; background: var(--bg);
  color: var(--dark); outline: none; transition: border-color 0.15s;
}
.add-task-input:focus { border-color: var(--olive2); background: white; }
.add-task-input::placeholder { color: #bbb; }
.add-task-btn {
  font-family: 'DM Sans', sans-serif;
  font-size: 0.8rem; font-weight: 700;
  background: var(--olive); color: white;
  border: none; border-radius: 7px; padding: 7px 12px;
  cursor: pointer; white-space: nowrap; transition: all 0.15s;
}
.add-task-btn:hover { background: var(--olive2); }

/* Empty workers */
.empty-workers {
  grid-column: span 3;
  text-align: center; padding: 48px 20px;
  color: var(--grey);
}
.empty-workers h3 { font-family: 'Playfair Display', serif; font-size: 1.1rem; margin-bottom: 8px; color: var(--dark); }
.empty-workers p { font-size: 0.85rem; }

/* Quick-add toast */
.toast {
  position: fixed; bottom: 24px; right: 24px;
  background: var(--dark); color: white;
  padding: 10px 18px; border-radius: 8px;
  font-size: 0.82rem; font-weight: 500;
  box-shadow: 0 4px 20px rgba(0,0,0,0.2);
  opacity: 0; transition: opacity 0.3s;
  pointer-events: none; z-index: 999;
}
.toast.show { opacity: 1; }

/* Worker color variants */
.wc0 { background: #3d5a2e; }
.wc1 { background: #5a3d2e; }
.wc2 { background: #2e3d5a; }
.wc3 { background: #5a2e3d; }
.wc4 { background: #2e5a4a; }
.wc5 { background: #4a2e5a; }
.wc6 { background: #5a4a2e; }
.wc7 { background: #2e4a5a; }

/* Add worker modal */
.modal-bg {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.45); z-index: 200;
  align-items: center; justify-content: center;
}
.modal-bg.open { display: flex; }
.modal {
  background: white; border-radius: var(--radius);
  padding: 24px; width: 340px; max-width: 92vw;
  box-shadow: 0 20px 60px rgba(0,0,0,0.25);
}
.modal h3 {
  font-family: 'Playfair Display', serif;
  font-size: 1.05rem; color: var(--dark); margin-bottom: 14px;
}
.modal-input {
  width: 100%;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.9rem;
  padding: 10px 12px; border: 1.5px solid var(--line);
  border-radius: 8px; margin-bottom: 10px;
  outline: none; color: var(--dark);
}
.modal-input:focus { border-color: var(--olive2); }
.modal-actions { display: flex; gap: 8px; }
.modal-confirm {
  flex: 1; background: var(--olive); color: white;
  border: none; border-radius: 8px; padding: 9px;
  font-family: 'DM Sans', sans-serif; font-size: 0.85rem; font-weight: 700;
  cursor: pointer;
}
.modal-cancel {
  background: var(--bg2); color: var(--grey);
  border: none; border-radius: 8px; padding: 9px 14px;
  font-family: 'DM Sans', sans-serif; font-size: 0.85rem; font-weight: 600;
  cursor: pointer;
}

/* Auth error */
.auth-error {
  color: #c0392b;
  font-size: 0.8rem;
  margin-bottom: 10px;
  padding: 7px 10px;
  background: #fdf0ee;
  border-radius: 6px;
  border: 1px solid #f5c6c0;
  display: none;
}
.auth-error.show { display: block; }

/* Print */
@media print {
  .menu-panel, .controls, .header { display: none; }
  .layout { display: block; height: auto; }
  .tasks-panel { padding: 0; }
  .workers-grid { grid-template-columns: repeat(2, 1fr); }
  .worker-card { page-break-inside: avoid; }
  .add-task-row, .task-del, .remove-worker-btn, .add-worker-btn, .tasks-header button { display: none; }
}

@media (max-width: 800px) {
  .layout { grid-template-columns: 1fr; height: auto; }
  .menu-panel { height: 340px; border-right: none; border-bottom: 2px solid var(--line); }
  .tasks-panel { padding: 16px; }
}
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="brand">
    <div class="brand-icon">☀️</div>
    <div>
      <h1>Helios &amp; Ella</h1>
      <p>Μενού &amp; Καθημερινές Εργασίες</p>
    </div>
  </div>
  <div class="header-actions">
    <button class="btn-sm btn-outline" onclick="window.print()">🖨 Εκτύπωση</button>
    <button class="btn-sm btn-outline" onclick="clearAll()">↺ Καθαρισμός</button>
    <a href="allergens.html" class="btn-sm btn-gold" style="text-decoration:none;">⚠️ Αλλεργιογόνα</a>
  </div>
</div>

<!-- Controls -->
<div class="controls">
  <div class="pill-group" id="dayPills"></div>
  <div class="sep"></div>
  <div class="pill-group" id="svcPills"></div>
  <div class="theme-tag" id="themeTag"></div>
</div>

<!-- Layout -->
<div class="layout">
  <!-- LEFT: Menu -->
  <div class="menu-panel">
    <div class="menu-panel-header">
      <div class="menu-panel-title">📋 Μενού Ημέρας</div>
    </div>
    <input class="search-box" type="text" placeholder="🔍 Αναζήτηση πιάτου..." oninput="filterMenu(this.value)" id="searchBox">
    <div id="menuContent"></div>
  </div>

  <!-- RIGHT: Tasks -->
  <div class="tasks-panel">
    <div class="tasks-header">
      <div class="tasks-title">👥 Ομάδα &amp; Εργασίες</div>
      <button class="add-worker-btn" onclick="openAddWorker()">+ Προσθήκη Ατόμου</button>
    </div>
    <div class="workers-grid" id="workersGrid"></div>
  </div>
</div>

<!-- Add Worker Modal -->
<div class="modal-bg" id="modal">
  <div class="modal">
    <h3>👤 Νέο Μέλος Ομάδας</h3>
    <input class="modal-input" type="text" id="workerNameInput" placeholder="Όνομα..." onkeydown="if(event.key==='Enter')confirmAddWorker()">
    <div class="modal-actions">
      <button class="modal-confirm" onclick="confirmAddWorker()">Προσθήκη</button>
      <button class="modal-cancel" onclick="closeModal()">Άκυρο</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Auth Overlay -->
<div id="auth-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:9999;align-items:center;justify-content:center;">
  <div style="background:white;border-radius:12px;padding:28px 24px;width:320px;max-width:92vw;box-shadow:0 20px 60px rgba(0,0,0,0.3);">
    <h3 style="font-family:'Playfair Display',serif;font-size:1.05rem;color:#1e2a1a;margin-bottom:6px;">🔒 Απαιτείται Κωδικός</h3>
    <p style="font-size:0.82rem;color:#7a7060;margin-bottom:14px;font-style:italic;">Εισάγετε τον κωδικό για να συνεχίσετε.</p>
    <input id="auth-input" type="password" placeholder="Κωδικός..."
      style="width:100%;font-family:'DM Sans',sans-serif;font-size:0.9rem;padding:10px 12px;border:1.5px solid #d9d0c0;border-radius:8px;margin-bottom:8px;outline:none;color:#1e2a1a;box-sizing:border-box;"
      onkeydown="if(event.key==='Enter')confirmAuth()">
    <div id="auth-error" style="display:none;color:#c0392b;font-size:0.8rem;margin-bottom:10px;padding:6px 10px;background:#fdf0ee;border-radius:6px;border:1px solid #f5c6c0;">
      Λάθος κωδικός. Δοκιμάστε ξανά.
    </div>
    <div style="display:flex;gap:8px;margin-top:4px;">
      <button onclick="confirmAuth()" style="flex:1;background:#3d5a2e;color:white;border:none;border-radius:8px;padding:10px;font-family:'DM Sans',sans-serif;font-size:0.85rem;font-weight:700;cursor:pointer;">Είσοδος</button>
      <button onclick="cancelAuth()" style="background:#ede6d8;color:#7a7060;border:none;border-radius:8px;padding:10px 16px;font-family:'DM Sans',sans-serif;font-size:0.85rem;font-weight:600;cursor:pointer;">Άκυρο</button>
    </div>
  </div>
</div>

<script>

/* ══ STATE ══ */
let S = {
  day: 'mon',
  service: 'breakfast',
  workers: [],  // {id, name}
  tasks: {},    // workerId => [{id, text, tag, done}]
};
const KEY = 'he_simple_v1';

function load() {
  try {
    const d = JSON.parse(localStorage.getItem(KEY));
    if (d) { S.workers = d.workers||[]; S.tasks = d.tasks||{}; }
  } catch(e){}
  const today = ['sun','mon','tue','wed','thu','fri','sat'][new Date().getDay()];
  S.day = today;
}
function save() {
  try { localStorage.setItem(KEY, JSON.stringify({workers:S.workers,tasks:S.tasks})); } catch(e){}
}

/* ══ AUTH ══ */
const PASSWORD = 'helios';
let isAuthenticated = false;
let pendingAuthCallback = null;

function requireAuth(cb) {
  if (isAuthenticated) { cb(); return; }
  pendingAuthCallback = cb;
  document.getElementById('auth-input').value = '';
  document.getElementById('auth-error').style.display = 'none';
  document.getElementById('auth-overlay').style.display = 'flex';
  setTimeout(() => document.getElementById('auth-input').focus(), 100);
}

function confirmAuth() {
  const val = document.getElementById('auth-input').value;
  if (val === PASSWORD) {
    isAuthenticated = true;
    const cb = pendingAuthCallback;
    pendingAuthCallback = null;
    document.getElementById('auth-overlay').style.display = 'none';
    if (cb) cb();
  } else {
    document.getElementById('auth-error').style.display = 'block';
    document.getElementById('auth-input').value = '';
    document.getElementById('auth-input').focus();
  }
}

function cancelAuth() {
  pendingAuthCallback = null;
  document.getElementById('auth-overlay').style.display = 'none';
}

/* ══ MENU RENDER ══ */
function getMenuSections() {
  if (S.service === 'breakfast') {
    return MENU.breakfast._all;
  } else {
    const std = MENU[S.service]._std || {};
    const daily = MENU[S.service][S.day] || {};
    return {...std, ...daily};
  }
}

let searchQuery = '';
function filterMenu(q) { searchQuery = q.toLowerCase().trim(); renderMenu(); }

function renderMenu() {
  const sections = getMenuSections();
  const el = document.getElementById('menuContent');
  let html = '';
  Object.entries(sections).forEach(([sec, items]) => {
    const filtered = items.filter(i => !searchQuery || i.toLowerCase().includes(searchQuery));
    if (!filtered.length) return;
    const [ico, ...rest] = sec.split(' ');
    html += `<div class="station-block">
      <div class="station-title"><span class="sico">${ico}</span> ${rest.join(' ')}</div>`;
    filtered.forEach(item => {
      html += `<div class="menu-item" onclick="quickAddFromMenu(this, '${esc(item)}', '${esc(sec)}')">
        <div class="item-dot"></div>
        <div class="item-name">${item}</div>
        <button class="item-add-btn" onclick="event.stopPropagation();addToWorker('${esc(item)}','${esc(sec)}')">+ Προσθήκη</button>
      </div>`;
    });
    html += `</div>`;
  });
  if (!html) html = `<div style="padding:20px;color:var(--grey);text-align:center;font-size:0.85rem">Δεν βρέθηκαν αποτελέσματα</div>`;
  el.innerHTML = html;
}

function esc(s){ return (s||'').replace(/'/g,"\\'").replace(/"/g,'&quot;'); }

/* ══ WORKER RENDER ══ */
const COLORS = ['wc0','wc1','wc2','wc3','wc4','wc5','wc6','wc7'];

function renderWorkers() {
  const el = document.getElementById('workersGrid');
  if (!S.workers.length) {
    el.innerHTML = `<div class="empty-workers">
      <h3>Δεν υπάρχουν μέλη ομάδας</h3>
      <p>Πάτα «+ Προσθήκη Ατόμου» για να ξεκινήσεις να αναθέτεις εργασίες.</p>
    </div>`;
    return;
  }
  el.innerHTML = S.workers.map((w, wi) => {
    const wTasks = S.tasks[w.id] || [];
    const done = wTasks.filter(t=>t.done).length;
    const col = COLORS[wi % COLORS.length];
    const initials = w.name.split(' ').map(p=>p[0]).join('').toUpperCase().slice(0,2);

    const tasksHtml = wTasks.length
      ? wTasks.map(t => `
        <div class="task-item" id="ti-${t.id}">
          <div class="task-check ${t.done?'checked':''}" onclick="toggleTask('${w.id}','${t.id}')"></div>
          <div class="task-text ${t.done?'done':''}">${t.text}</div>
          ${t.tag ? `<div class="task-tag">${shortTag(t.tag)}</div>` : ''}
          <button class="task-del" onclick="deleteTask('${w.id}','${t.id}')" title="Διαγραφή">✕</button>
        </div>`).join('')
      : `<div style="padding:10px 4px;color:#bbb;font-size:0.8rem;font-style:italic">Καμία εργασία ακόμα</div>`;

    return `<div class="worker-card">
      <div class="worker-card-header ${col}">
        <div class="worker-name">
          <div class="worker-avatar">${initials}</div>
          ${w.name}
        </div>
        <div class="worker-header-right">
          <span class="worker-progress-text">${done}/${wTasks.length}</span>
          <button class="remove-worker-btn" onclick="removeWorker('${w.id}')" title="Αφαίρεση">✕</button>
        </div>
      </div>
      <div class="worker-tasks-list" id="wtl-${w.id}">${tasksHtml}</div>
      <div class="add-task-row">
        <div class="add-task-input-wrap">
          <input class="add-task-input" type="text" placeholder="Πρόσθεσε εργασία..." id="inp-${w.id}"
            onkeydown="if(event.key==='Enter')submitTask('${w.id}')">
          <button class="add-task-btn" onclick="submitTask('${w.id}')">+</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function shortTag(sec) {
  // Remove emoji prefix for tag
  return sec.replace(/[\u{1F300}-\u{1FFFF}]|[\u{2600}-\u{26FF}]|[\u{2700}-\u{27BF}]/gu,'').trim().split(' ').slice(0,2).join(' ');
}

/* ══ INTERACTIONS ══ */
function submitTask(wid) {
  const inp = document.getElementById('inp-' + wid);
  const text = inp.value.trim();
  if (!text) return;
  requireAuth(() => {
    addTask(wid, text, '');
    const i = document.getElementById('inp-' + wid);
    if (i) i.value = '';
  });
}

function addTask(wid, text, tag) {
  if (!S.tasks[wid]) S.tasks[wid] = [];
  S.tasks[wid].push({ id: Date.now() + Math.random().toString(36).slice(2), text, tag, done: false });
  save();
  renderWorkers();
}

function toggleTask(wid, tid) {
  const tasks = S.tasks[wid] || [];
  const t = tasks.find(x => x.id === tid);
  if (t) { t.done = !t.done; save(); renderWorkers(); }
}

function deleteTask(wid, tid) {
  requireAuth(() => {
    S.tasks[wid] = (S.tasks[wid]||[]).filter(x => x.id !== tid);
    save(); renderWorkers();
  });
}

function addToWorker(item, tag) {
  requireAuth(() => {
    if (!S.workers.length) { showToast('Πρόσθεσε πρώτα μέλη ομάδας!'); return; }
    if (S.workers.length === 1) {
      addTask(S.workers[0].id, item, tag);
      showToast(`✓ Προστέθηκε στον/ην ${S.workers[0].name}`);
    } else {
      showWorkerPicker(item, tag);
    }
  });
}

function quickAddFromMenu(el, item, tag) {
  // toggle selection
  el.classList.toggle('selected');
}

/* Worker picker */
function showWorkerPicker(item, tag) {
  const opts = S.workers.map(w =>
    `<button onclick="addTask('${w.id}','${esc(item)}','${esc(tag)}');closeModal();showToast('✓ ${esc(w.name)}')" style="width:100%;text-align:left;padding:9px 12px;margin-bottom:6px;border:1.5px solid var(--line);border-radius:8px;background:var(--bg);cursor:pointer;font-family:DM Sans,sans-serif;font-size:0.85rem;font-weight:600;color:var(--dark);">
      👤 ${w.name}
    </button>`
  ).join('');
  document.getElementById('modal').innerHTML = `<div class="modal">
    <h3>Σε ποιον να το αναθέσεις;</h3>
    <p style="font-size:0.82rem;color:var(--grey);margin-bottom:12px;font-style:italic">${item}</p>
    ${opts}
    <button class="modal-cancel" style="width:100%;margin-top:4px" onclick="restoreModal();closeModal()">Άκυρο</button>
  </div>`;
  document.getElementById('modal').classList.add('open');
}

    <div class="modal-actions">
      <button class="modal-confirm" onclick="confirmAddWorker()">Προσθήκη</button>
      <button class="modal-cancel" onclick="closeModal()">Άκυρο</button>
    </div>
  </div>`;
}

function openAddWorker() {
  requireAuth(() => {
    restoreModal();
    document.getElementById('modal').classList.add('open');
    setTimeout(() => document.getElementById('workerNameInput')?.focus(), 100);
  });
}
function closeModal() { document.getElementById('modal').classList.remove('open'); }
function confirmAddWorker() {
  const name = document.getElementById('workerNameInput')?.value?.trim();
  if (!name) return;
  S.workers.push({ id: Date.now().toString(36), name });
  save(); closeModal(); renderWorkers();
}

function removeWorker(wid) {
  requireAuth(() => {
    if (!confirm('Αφαίρεση ατόμου και όλων των εργασιών του;')) return;
    S.workers = S.workers.filter(w => w.id !== wid);
    delete S.tasks[wid];
    save(); renderWorkers();
  });
}

function clearAll() {
  requireAuth(() => {
    if (!confirm('Καθαρισμός όλων των εργασιών (οι εργαζόμενοι παραμένουν);')) return;
    S.tasks = {};
    save(); renderWorkers();
  });
}

/* Toast */
let toastTimer;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2000);
}

/* ══ TABS ══ */
function renderTabs() {
  // Days
  document.getElementById('dayPills').innerHTML = DAYS.map(d =>
    `<button class="pill${S.day===d.key?' active':''}" onclick="selDay('${d.key}')">${d.short}</button>`
  ).join('');
  // Services
  const svcs = [{k:'breakfast',l:'☀️ Πρωινό',c:'bf'},{k:'lunch',l:'🌤 Μεσημέρι',c:'lunch'},{k:'dinner',l:'🌙 Δείπνο',c:'dinner'}];
  document.getElementById('svcPills').innerHTML = svcs.map(s =>
    `<button class="pill service-${s.c}${S.service===s.k?' active '+s.c:''}" onclick="selSvc('${s.k}')">${s.l}</button>`
  ).join('');
  // Theme
  const tag = document.getElementById('themeTag');
  if (S.service==='dinner') { tag.textContent = DINNER_THEME[S.day]; tag.classList.add('show'); }
  else { tag.classList.remove('show'); tag.textContent=''; }
}

function selDay(d) { S.day=d; renderTabs(); renderMenu(); document.getElementById('searchBox').value=''; searchQuery=''; }
function selSvc(s) { S.service=s; renderTabs(); renderMenu(); document.getElementById('searchBox').value=''; searchQuery=''; }

/* ══ INIT ══ */
load();
renderTabs();
renderMenu();
renderWorkers();
</script>
</body>
</html>
