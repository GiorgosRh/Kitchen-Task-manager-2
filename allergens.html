<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Helios & Ella — Αλλεργιογόνα</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0f1117;
  --surface: #181c27;
  --surface2: #1e2335;
  --border: rgba(255,255,255,0.07);
  --text: #e8eaf0;
  --muted: #6b7280;
  --white: #ffffff;

  /* Allergen colors */
  --c-gluten:  #ef4444;
  --c-dairy:   #f59e0b;
  --c-eggs:    #eab308;
  --c-fish:    #3b82f6;
  --c-shell:   #06b6d4;
  --c-nuts:    #8b5cf6;
  --c-peanuts: #ec4899;
  --c-soy:     #10b981;
  --c-celery:  #84cc16;
  --c-mustard: #f97316;
  --c-sesame:  #a16207;
  --c-sulph:   #6366f1;
  --c-lupin:   #14b8a6;
  --c-mollusc: #64748b;
}

/* ── LIGHT MODE ── */
body.light {
  --bg: #f4f6f9;
  --surface: #ffffff;
  --surface2: #eef0f5;
  --border: rgba(0,0,0,0.08);
  --text: #1a1f2e;
  --muted: #6b7280;
  --white: #1a1f2e;
}
body.light .search-input { background: #fff; color: #1a1f2e; }
body.light .view-btn { color: #6b7280; }
body.light .allergen-dish-tag { background: #eef0f5; color: #1a1f2e; }
body.light thead tr { background: #eef0f5; }
body.light tbody tr:hover { background: #f9fafb; }
body.light .dish-card { background: #fff; }

/* Theme toggle button */
.btn-theme {
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1);
  color: var(--muted);
  font-size: 1rem;
  padding: 6px 10px;
  border-radius: 8px;
  cursor: pointer;
  transition: all 0.15s;
  line-height: 1;
}
.btn-theme:hover { background: rgba(255,255,255,0.12); color: var(--text); }
body.light .btn-theme { background: rgba(0,0,0,0.05); border-color: rgba(0,0,0,0.1); }
body.light .btn-theme:hover { background: rgba(0,0,0,0.1); }

body {
  font-family: 'Outfit', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

/* ── HEADER ── */
.header {
  padding: 18px 24px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  gap: 16px; flex-wrap: wrap;
}

.brand {
  display: flex; align-items: center; gap: 10px;
}
.brand h1 {
  font-family: 'Syne', sans-serif;
  font-size: 1.15rem; font-weight: 800;
  color: var(--white);
  letter-spacing: -0.01em;
}
.brand span { font-size: 1.4rem; }
.brand p { font-size: 0.68rem; color: var(--muted); letter-spacing: 0.12em; text-transform: uppercase; margin-top: 1px; }

.header-right { display: flex; gap: 8px; align-items: center; }
.btn {
  font-family: 'Outfit', sans-serif;
  font-size: 0.78rem; font-weight: 600;
  padding: 7px 14px; border-radius: 8px; border: none; cursor: pointer;
  transition: all 0.15s;
}
.btn-ghost { background: rgba(255,255,255,0.06); color: var(--muted); }
.btn-ghost:hover { background: rgba(255,255,255,0.1); color: var(--text); }
.btn-primary { background: #ef4444; color: white; }
.btn-primary:hover { filter: brightness(1.1); }

/* ── LEGEND ── */
.legend {
  padding: 14px 24px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex; gap: 8px; flex-wrap: wrap; align-items: center;
}
.legend-label { font-size: 0.7rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; margin-right: 4px; }

.a-chip {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 4px 10px; border-radius: 20px;
  font-size: 0.72rem; font-weight: 600;
  cursor: pointer; border: 1.5px solid transparent;
  transition: all 0.15s; white-space: nowrap;
  opacity: 0.55;
}
.a-chip:hover { opacity: 1; transform: scale(1.05); }
.a-chip.active { opacity: 1; }
.a-chip .ico { font-size: 0.85rem; }

/* ── SEARCH + FILTERS ── */
.toolbar {
  padding: 14px 24px;
  display: flex; gap: 10px; align-items: center; flex-wrap: wrap;
  border-bottom: 1px solid var(--border);
  background: var(--bg);
}

.search-wrap { position: relative; flex: 1; min-width: 200px; }
.search-wrap .ico { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 0.9rem; }
.search-input {
  width: 100%;
  font-family: 'Outfit', sans-serif;
  font-size: 0.85rem;
  background: var(--surface2);
  border: 1.5px solid var(--border);
  color: var(--text);
  padding: 9px 12px 9px 36px;
  border-radius: 9px; outline: none;
  transition: border-color 0.15s;
}
.search-input:focus { border-color: rgba(255,255,255,0.2); }
.search-input::placeholder { color: var(--muted); }

.view-btns { display: flex; gap: 4px; background: var(--surface2); padding: 3px; border-radius: 8px; }
.view-btn {
  padding: 6px 12px; border: none; border-radius: 6px; cursor: pointer;
  font-family: 'Outfit', sans-serif; font-size: 0.78rem; font-weight: 600;
  background: transparent; color: var(--muted); transition: all 0.15s;
}
.view-btn.active { background: #ef4444; color: white; }

.filter-clear {
  font-family: 'Outfit', sans-serif; font-size: 0.75rem; font-weight: 600;
  color: var(--muted); background: none; border: none; cursor: pointer; padding: 4px 8px;
}
.filter-clear:hover { color: var(--text); }

/* ── STATS BAR ── */
.stats-bar {
  padding: 8px 24px;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  font-size: 0.75rem; color: var(--muted);
  display: flex; gap: 16px;
}
.stat-num { color: var(--text); font-weight: 700; }

/* ── MAIN ── */
.main { padding: 20px 24px; max-width: 1400px; margin: 0 auto; }

/* ── TABLE VIEW ── */
.table-wrap { overflow-x: auto; border-radius: 12px; border: 1px solid var(--border); }
table { width: 100%; border-collapse: collapse; min-width: 900px; }
thead tr { background: var(--surface2); }
th {
  padding: 10px 12px;
  font-family: 'Syne', sans-serif;
  font-size: 0.7rem; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.1em;
  color: var(--muted); text-align: left;
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
}
th.allergen-th {
  text-align: center; padding: 8px 6px; font-size: 0.65rem; cursor: pointer;
}
th.allergen-th:hover { color: var(--text); }
th.allergen-th.highlight { color: var(--white); }

tbody tr {
  border-bottom: 1px solid var(--border);
  transition: background 0.1s;
}
tbody tr:last-child { border-bottom: none; }
tbody tr:hover { background: var(--surface); }
tbody tr.hidden-row { display: none; }

.dish-cell { padding: 10px 12px; }
.dish-name { font-size: 0.85rem; font-weight: 500; color: var(--text); }
.dish-cat { font-size: 0.7rem; color: var(--muted); margin-top: 1px; }

.allergen-cell { text-align: center; padding: 8px 6px; }
.dot {
  display: inline-block; width: 18px; height: 18px; border-radius: 50%;
  font-size: 0.65rem; line-height: 18px; text-align: center;
  transition: transform 0.1s;
}
.dot.yes { font-size: 0.75rem; }
.dot.yes:hover { transform: scale(1.3); }
.dot.no { background: transparent; }

/* ── CARD VIEW ── */
.cards-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 12px;
}

.dish-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 14px 16px;
  transition: border-color 0.15s;
}
.dish-card:hover { border-color: rgba(255,255,255,0.15); }
.dish-card.hidden-card { display: none; }

.card-name { font-family: 'Syne', sans-serif; font-size: 0.9rem; font-weight: 700; color: var(--white); margin-bottom: 4px; }
.card-cat { font-size: 0.7rem; color: var(--muted); margin-bottom: 10px; }

.card-allergens { display: flex; flex-wrap: wrap; gap: 5px; }
.card-allergens .a-tag {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 3px 8px; border-radius: 20px;
  font-size: 0.68rem; font-weight: 600;
  border: 1px solid;
}
.no-allergens { font-size: 0.75rem; color: var(--muted); font-style: italic; }

/* ── ALLERGEN VIEW ── */
.allergen-view { display: flex; flex-direction: column; gap: 16px; }
.allergen-section {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
}
.allergen-section-header {
  padding: 12px 16px;
  display: flex; align-items: center; gap: 10px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
}
.allergen-section-title {
  font-family: 'Syne', sans-serif;
  font-size: 0.9rem; font-weight: 700;
  flex: 1;
}
.allergen-count { font-size: 0.75rem; color: var(--muted); }
.allergen-dishes { padding: 12px 16px; display: flex; flex-wrap: wrap; gap: 6px; }
.allergen-dish-tag {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 4px 10px;
  font-size: 0.78rem; color: var(--text);
}

/* ── INTERACTIVE CELLS ── */
.allergen-cell { cursor: pointer; }
.dot-empty { width: 18px; height: 18px; border-radius: 50%; display: inline-block; transition: all 0.15s; }
.allergen-cell:hover .dot-empty { background: rgba(255,255,255,0.08); }
.allergen-cell:hover .dot-empty::after { content: '+'; color: rgba(255,255,255,0.3); font-size: 0.7rem; display: block; line-height: 18px; text-align: center; }
.dot.yes { cursor: pointer; }
.dot.yes:hover { opacity: 0.7; transform: scale(1.1); }

.add-ico { cursor: pointer; transition: opacity 0.15s, transform 0.1s; }
.add-ico:hover { transform: scale(1.2); }

.a-tag { cursor: pointer; transition: opacity 0.15s; }
.a-tag:hover { opacity: 0.7 !important; }

.btn-reset { background: rgba(255,255,255,0.06); color: var(--muted); border: 1px solid rgba(255,255,255,0.1); }
.btn-reset:hover { background: rgba(255,255,255,0.1); color: var(--text); }

/* Print */
@media print {
  body { background: white; color: black; }
  .header, .toolbar, .legend, .stats-bar, .btn, .view-btns { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  .view-btns, .header-right { display: none; }
  table { font-size: 0.75rem; }
  .dot.yes { -webkit-print-color-adjust: exact; }
}

@media (max-width: 600px) {
  .header { padding: 12px 16px; }
  .legend { padding: 10px 16px; }
  .toolbar { padding: 10px 16px; }
  .main { padding: 14px 16px; }
  .stats-bar { padding: 6px 16px; }
}
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="brand">
    <span>☀️</span>
    <div>
      <h1>Helios &amp; Ella — Αλλεργιογόνα</h1>

    </div>
  </div>
  <div class="header-right">

    <button class="btn btn-ghost btn-reset" onclick="resetToDefaults()">↺ Reset</button>
    <button class="btn btn-ghost" onclick="window.print()">🖨 Εκτύπωση</button>
    <button class="btn-theme" id="themeBtn" onclick="toggleTheme()" title="Εναλλαγή θέματος">🌙</button>
  </div>
</div>

<!-- Legend -->
<div class="legend">
  <span class="legend-label">Φίλτρο:</span>
  <div id="legendChips"></div>
</div>

<!-- Toolbar -->
<div class="toolbar">
  <div class="search-wrap">
    <span class="ico">🔍</span>
    <input class="search-input" type="text" placeholder="Αναζήτηση πιάτου..." oninput="filterDishes(this.value)" id="searchInput">
  </div>
  <div class="view-btns">
    <button class="view-btn active" onclick="setView('table', this)">📋 Πίνακας</button>
    <button class="view-btn" onclick="setView('cards', this)">🃏 Κάρτες</button>
    <button class="view-btn" onclick="setView('allergen', this)">⚠️ Ανά Αλλ.</button>
  </div>
  <button class="filter-clear" onclick="clearFilters()">✕ Καθαρισμός</button>
</div>

<!-- Stats -->
<div class="stats-bar" id="statsBar"></div>

<!-- Auth Overlay -->
<div id="auth-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:9999;align-items:center;justify-content:center;">
  <div style="background:#181c27;border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:28px 24px;width:320px;max-width:92vw;box-shadow:0 20px 60px rgba(0,0,0,0.5);">

    <p style="font-size:0.82rem;color:#6b7280;margin-bottom:14px;font-style:italic;">Εισάγετε τον κωδικό για να συνεχίσετε.</p>
    <input id="auth-input" type="password" placeholder="Κωδικός..."
      style="width:100%;font-family:'Outfit',sans-serif;font-size:0.9rem;padding:10px 12px;border:1.5px solid rgba(255,255,255,0.12);border-radius:8px;margin-bottom:8px;outline:none;color:#e8eaf0;background:#1e2335;box-sizing:border-box;"
      onkeydown="if(event.key==='Enter')confirmAuth()">
    <div id="auth-error" style="display:none;color:#ef4444;font-size:0.8rem;margin-bottom:10px;padding:6px 10px;background:rgba(239,68,68,0.1);border-radius:6px;border:1px solid rgba(239,68,68,0.3);">
      Λάθος κωδικός. Δοκιμάστε ξανά.
    </div>
    <div style="display:flex;gap:8px;margin-top:4px;">
      <button onclick="confirmAuth()" style="flex:1;background:#ef4444;color:white;border:none;border-radius:8px;padding:10px;font-family:'Outfit',sans-serif;font-size:0.85rem;font-weight:700;cursor:pointer;">Είσοδος</button>
      <button onclick="cancelAuth()" style="background:rgba(255,255,255,0.06);color:#6b7280;border:none;border-radius:8px;padding:10px 16px;font-family:'Outfit',sans-serif;font-size:0.85rem;font-weight:600;cursor:pointer;">Άκυρο</button>
    </div>
  </div>
</div>

<!-- Main -->
<div class="main" id="mainContent"></div>

/* ══ THEME ══ */
const THEME_KEY = 'he_allergens_theme';

function applyTheme(theme) {
  document.body.classList.toggle('light', theme === 'light');
  document.getElementById('themeBtn').textContent = theme === 'light' ? '🌙' : '☀️';
}

function toggleTheme() {
  const isLight = document.body.classList.contains('light');
  const next = isLight ? 'dark' : 'light';
  applyTheme(next);
  try { localStorage.setItem(THEME_KEY, next); } catch(e) {}
}

(function initTheme() {
  const saved = localStorage.getItem(THEME_KEY) || 'dark';
  applyTheme(saved);
})();

/* ══ AUTH ══ */
const AUTH_PASSWORD = '1234'; // matches app admin PIN
let isAuthenticated = false;
let pendingAuthCallback = null;

function requireAuth(cb) {
  if (isAuthenticated) { cb(); return; }
  pendingAuthCallback = cb;
  document.getElementById('auth-input').value = '';
  document.getElementById('auth-error').style.display = 'none';
  document.getElementById('auth-overlay').style.display = 'flex';
  setTimeout(() => document.getElementById('auth-input').focus(), 100);
}

function confirmAuth() {
  const val = document.getElementById('auth-input').value;
  if (val === AUTH_PASSWORD) {
    isAuthenticated = true;
    const cb = pendingAuthCallback;
    pendingAuthCallback = null;
    document.getElementById('auth-overlay').style.display = 'none';
    if (cb) cb();
  } else {
    document.getElementById('auth-error').style.display = 'block';
    document.getElementById('auth-input').value = '';
    document.getElementById('auth-input').focus();
  }
}

function cancelAuth() {
  pendingAuthCallback = null;
  document.getElementById('auth-overlay').style.display = 'none';
}

/* ══ SERVER SYNC ══ */
const SERVER_BASE = 'https://helioskitch-mpdj7fvp.manus.space';
const ALLERGEN_STORAGE_KEY = 'he_allergens_v2';

let DISH_STATE = DISHES.map(([name, cat, al]) => [name, cat, {...al}]);

// Load overrides from localStorage cache, then fetch from server
async function loadDishState() {
  // 1. Apply local cache immediately for fast display
  try {
    const saved = JSON.parse(localStorage.getItem(ALLERGEN_STORAGE_KEY));
    if (saved) applyOverrides(saved);
  } catch(e) {}

  // 2. Fetch from server and merge
  try {
    const res = await fetch(SERVER_BASE + '/api/allergens');
    if (res.ok) {
      const data = await res.json();
      if (data.overrides) {
        // Convert server format (array of keys) to site format (object map)
        const serverMap = {};
        Object.entries(data.overrides).forEach(([dishName, keys]) => {
          const obj = {};
          keys.forEach(k => { obj[k] = 1; });
          serverMap[dishName] = obj;
        });
        applyOverrides(serverMap);
        // Update local cache
        try { localStorage.setItem(ALLERGEN_STORAGE_KEY, JSON.stringify(serverMap)); } catch(e) {}
      }
    }
  } catch(e) { console.warn('Server sync failed, using local cache', e); }

  renderLegend();
  renderMain();
  updateStats(DISH_STATE.length);
}

function applyOverrides(overrides) {
  DISH_STATE = DISH_STATE.map(([name, cat, al]) =>
    [name, cat, Object.prototype.hasOwnProperty.call(overrides, name) ? {...overrides[name]} : al]
  );
}

function saveDishState() {
  const data = {};
  DISH_STATE.forEach(([name, cat, al]) => { data[name] = al; });
  try { localStorage.setItem(ALLERGEN_STORAGE_KEY, JSON.stringify(data)); } catch(e) {}
}

async function pushDishToServer(dishName, allergenObj) {
  const keys = Object.keys(allergenObj);
  try {
    await fetch(SERVER_BASE + '/api/allergens', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ dish: dishName, allergens: keys }),
    });
  } catch(e) { console.warn('Failed to push to server:', e); }
}

function toggleDishAllergen(idx, key) {
  requireAuth(() => {
    const dish = DISH_STATE[idx];
    if (!dish) return;
    if (dish[2][key]) delete dish[2][key];
    else dish[2][key] = 1;
    saveDishState();
    pushDishToServer(dish[0], dish[2]);
    renderMain();
  });
}

function resetToDefaults() {
  requireAuth(() => {
    if (!confirm('Επαναφορά όλων των αλλεργιογόνων στις αρχικές τιμές;')) return;
    localStorage.removeItem(ALLERGEN_STORAGE_KEY);
    DISH_STATE = DISHES.map(([name, cat, al]) => [name, cat, {...al}]);
    // Push empty overrides to server for each dish that was modified
    // (just reload from server next time)
    renderMain();
  });
}

/* ══ STATE ══ */
let activeAllergens = new Set();
let searchQ = '';
let currentView = 'table';

/* ══ LEGEND CHIPS ══ */
function renderLegend() {
  const el = document.getElementById('legendChips');
  el.innerHTML = ALLERGENS.map(a => `
    <div class="a-chip${activeAllergens.has(a.key) ? ' active' : ''}"
      style="background:${activeAllergens.has(a.key) ? a.color+'22' : 'rgba(255,255,255,0.04)'};
             border-color:${activeAllergens.has(a.key) ? a.color : 'transparent'};
             color:${activeAllergens.has(a.key) ? a.color : 'var(--muted)'}"
      onclick="toggleAllergen('${a.key}')">
      <span class="ico">${a.ico}</span> ${a.label}
    </div>`).join('');
}

function toggleAllergen(key) {
  if (activeAllergens.has(key)) activeAllergens.delete(key);
  else activeAllergens.add(key);
  renderLegend();
  applyFilters();
}

function clearFilters() {
  activeAllergens.clear();
  searchQ = '';
  document.getElementById('searchInput').value = '';
  renderLegend();
  applyFilters();
}

/* ══ FILTER LOGIC ══ */
function visibleDishes() {
  return DISH_STATE.filter(([name, cat, allergens]) => {
    const matchSearch = !searchQ || name.toLowerCase().includes(searchQ) || cat.toLowerCase().includes(searchQ);
    const matchAllergen = activeAllergens.size === 0 || [...activeAllergens].every(k => allergens[k]);
    return matchSearch && matchAllergen;
  });
}

function filterDishes(q) {
  searchQ = q.toLowerCase().trim();
  applyFilters();
}

function applyFilters() {
  const visible = new Set(visibleDishes().map(d => d[0]));
  updateStats(visible.size);

  if (currentView === 'table') {
    document.querySelectorAll('tbody tr').forEach(row => {
      row.classList.toggle('hidden-row', !visible.has(row.dataset.dish));
    });
    // Highlight active allergen columns
    ALLERGENS.forEach((a, i) => {
      const th = document.querySelector(`th[data-akey="${a.key}"]`);
      if (th) th.classList.toggle('highlight', activeAllergens.has(a.key));
    });
  } else if (currentView === 'cards') {
    document.querySelectorAll('.dish-card').forEach(card => {
      card.classList.toggle('hidden-card', !visible.has(card.dataset.dish));
    });
  } else {
    renderAllergenView();
  }
}

function updateStats(count) {
  const total = DISHES.length;
  const allergenCount = activeAllergens.size;
  document.getElementById('statsBar').innerHTML =
    `<span>Εμφάνιση <span class="stat-num">${count}</span> από <span class="stat-num">${total}</span> πιάτα</span>` +
    (allergenCount ? `<span>· Φίλτρο: <span class="stat-num">${allergenCount}</span> αλλεργιογόνα</span>` : '');
}

/* ══ VIEWS ══ */
function setView(view, btn) {
  currentView = view;
  document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderMain();
}

function renderMain() {
  const el = document.getElementById('mainContent');
  if (currentView === 'table') {
    el.innerHTML = renderTable();
  } else if (currentView === 'cards') {
    el.innerHTML = `<div class="cards-grid">${DISH_STATE.map((d, i) => renderCard(d, i)).join('')}</div>`;
  } else {
    renderAllergenView();
    return;
  }
  applyFilters();
}

/* TABLE */
function renderTable() {
  const allergenHeaders = ALLERGENS.map(a =>
    `<th class="allergen-th" data-akey="${a.key}" onclick="toggleAllergen('${a.key}')" title="${a.label}">${a.ico}<br><span style="font-size:0.6rem">${a.short}</span></th>`
  ).join('');

  const rows = DISH_STATE.map(([name, cat, allergens], idx) => {
    const cells = ALLERGENS.map(a => {
      if (allergens[a.key]) {
        return `<td class="allergen-cell" onclick="toggleDishAllergen(${idx},'${a.key}')" title="Αφαίρεση: ${a.label}"><div class="dot yes" style="background:${a.color}22;color:${a.color};border:1.5px solid ${a.color}">✓</div></td>`;
      }
      return `<td class="allergen-cell" onclick="toggleDishAllergen(${idx},'${a.key}')" title="Προσθήκη: ${a.label}"><div class="dot-empty"></div></td>`;
    }).join('');

    return `<tr data-dish="${name}">
      <td class="dish-cell"><div class="dish-name">${name}</div><div class="dish-cat">${cat}</div></td>
      ${cells}
    </tr>`;
  }).join('');

  return `<div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th style="min-width:200px">🍽 Πιάτο</th>
          ${allergenHeaders}
        </tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>
  </div>`;
}

/* CARDS */
function renderCard([name, cat, allergens], idx) {
  const activeTags = ALLERGENS.filter(a => allergens[a.key]).map(a =>
    `<div class="a-tag" onclick="toggleDishAllergen(${idx},'${a.key}')"
      style="color:${a.color};border-color:${a.color}44;background:${a.color}11"
      title="Αφαίρεση: ${a.label}">${a.ico} ${a.label} ×</div>`
  ).join('');

  const inactiveIcos = ALLERGENS.filter(a => !allergens[a.key]).map(a =>
    `<span class="add-ico" onclick="toggleDishAllergen(${idx},'${a.key}')"
      title="Προσθήκη: ${a.label}" style="opacity:0.22;font-size:0.85rem;">${a.ico}</span>`
  ).join('');

  return `<div class="dish-card" data-dish="${name}">
    <div class="card-name">${name}</div>
    <div class="card-cat">${cat}</div>
    <div class="card-allergens">
      ${activeTags || '<span class="no-allergens">Χωρίς γνωστά αλλεργιογόνα</span>'}
    </div>
    <div style="display:flex;flex-wrap:wrap;gap:4px;margin-top:8px;padding-top:6px;border-top:1px solid rgba(255,255,255,0.06);">
      ${inactiveIcos}
    </div>
  </div>`;
}

/* ALLERGEN VIEW */
function renderAllergenView() {
  const el = document.getElementById('mainContent');
  const visible = visibleDishes();

  const html = ALLERGENS.map(a => {
    const matching = visible.filter(([n,c,al]) => al[a.key]);
    if (!matching.length) return '';
    const dishes = matching.map(([n]) => `<div class="allergen-dish-tag">${n}</div>`).join('');
    return `<div class="allergen-section">
      <div class="allergen-section-header" style="border-left:4px solid ${a.color}">
        <span style="font-size:1.3rem">${a.ico}</span>
        <div class="allergen-section-title" style="color:${a.color}">${a.label}</div>
        <div class="allergen-count">${matching.length} πιάτα</div>
      </div>
      <div class="allergen-dishes">${dishes}</div>
    </div>`;
  }).join('');

  el.innerHTML = `<div class="allergen-view">${html || '<div style="padding:32px;color:var(--muted);text-align:center">Δεν βρέθηκαν αποτελέσματα</div>'}</div>`;
  updateStats(visible.length);
}

/* ══ INIT ══ */
// Show initial state from static data immediately, then update from server
renderLegend();
renderMain();
updateStats(DISH_STATE.length);
// Then load overrides (async)
loadDishState();
</script>
</body>
</html>
